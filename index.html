<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>A0nynx_3i · Lucid White</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F8F8FA">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://chatbotcos.weixin.qq.com/chatbot/30-openaiassets_25bb7ee042e09f9b90273daf8cb56699_4818891778186903087.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Grotesk:wght@300;400;500;700;900&family=Great+Vibes&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/00-variables.css">
    <link rel="stylesheet" href="css/01-frame.css">
    <link rel="stylesheet" href="css/02-theme.css">
    <link rel="stylesheet" href="css/03-desktop.css">
    <link rel="stylesheet" href="css/04-widgets.css">
    <link rel="stylesheet" href="css/05-chat-app.css">
    <link rel="stylesheet" href="css/06-chat-detail.css">
</head>
<body>
    <div class="viewport" id="main-frame">

        <!-- 背景层 -->
        <div class="architectural-light"></div>
        <div class="texture-noise"></div>
        <div class="bg-watermark">Aesthetic</div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="time" id="desktop-clock">09:41</div>
            <div class="status-icons">
                <svg viewBox="0 0 24 24"><path d="M2 22h20V2z" fill="currentColor"/></svg>
                <svg viewBox="0 0 24 24" style="width:16px;">
                    <path d="M17 4h-3V2h-4v2H7v18h10V4zm1 0c1.1 0 2 .9 2 2v14c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2h1V2h6v2h1z" fill="currentColor"/>
                </svg>
            </div>
        </div>

        <!-- 分页容器 -->
        <div class="desktop-swiper" id="swiper">
            <div class="desktop-page" id="page1"></div>
            <div class="desktop-page" id="page2"></div>
        </div>

        <!-- 分页点 -->
        <div class="page-dots">
            <div class="dot active" id="dot1"></div>
            <div class="dot" id="dot2"></div>
        </div>

    </div>

    <script src="js/app.js"></script>
    <script src="js/chat-db.js"></script>
    <script src="js/chat-detail-ui.js"></script>
    <script src="js/chat-app.js"></script>
    <script src="js/settings-hub.js"></script>
    <script src="js/lens-app.js"></script>
    <script src="js/worldbook-app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./sw.js').then(function(registration) {
                    console.log('ServiceWorker registration successful');
                }).catch(function(err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
